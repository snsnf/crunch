name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI with bundled ffmpeg
        working-directory: gui
        run: bash build.sh

      - name: Build CLI
        run: |
          GOARCH=${{ matrix.arch }} go build -o crunch .

      - name: Package
        run: |
          cd gui/build/bin
          zip -r /tmp/Crunch-macos-${{ matrix.arch }}.zip Crunch.app
          cd $GITHUB_WORKSPACE
          zip /tmp/crunch-cli-macos-${{ matrix.arch }}.zip crunch

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ matrix.arch }}
          path: |
            /tmp/Crunch-macos-${{ matrix.arch }}.zip
            /tmp/crunch-cli-macos-${{ matrix.arch }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI
        working-directory: gui
        run: wails build

      - name: Download static ffmpeg (Windows)
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg-extract" -Force
          $ffDir = Get-ChildItem "$env:TEMP\ffmpeg-extract" -Directory | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)\bin\ffmpeg.exe" "gui\build\bin\ffmpeg.exe"
          Copy-Item "$($ffDir.FullName)\bin\ffprobe.exe" "gui\build\bin\ffprobe.exe"

      - name: Build CLI
        run: go build -o crunch.exe .

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts"
          makensis installer\crunch.nsi

      - name: Package CLI
        shell: powershell
        run: |
          Compress-Archive -Path "crunch.exe" -DestinationPath "artifacts\crunch-cli-windows-amd64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-amd64
          path: |
            artifacts\Crunch-Setup-windows-amd64.exe
            artifacts\crunch-cli-windows-amd64.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI
        working-directory: gui
        run: wails build

      - name: Download static ffmpeg (Linux)
        run: |
          curl -L -o /tmp/ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          mkdir -p /tmp/ffmpeg-extract
          tar xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract --strip-components=1
          cp /tmp/ffmpeg-extract/ffmpeg gui/build/bin/ffmpeg
          cp /tmp/ffmpeg-extract/ffprobe gui/build/bin/ffprobe
          chmod +x gui/build/bin/ffmpeg gui/build/bin/ffprobe

      - name: Build CLI
        run: go build -o crunch .

      - name: Package
        run: |
          cd gui/build/bin
          tar czf /tmp/Crunch-linux-amd64.tar.gz *
          cd $GITHUB_WORKSPACE
          tar czf /tmp/crunch-cli-linux-amd64.tar.gz crunch

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-amd64
          path: |
            /tmp/Crunch-linux-amd64.tar.gz
            /tmp/crunch-cli-linux-amd64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" \) -exec sha256sum {} \; | sed 's|  \./||' > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/checksums.txt

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM64=$(grep 'Crunch-macos-arm64.zip' artifacts/checksums.txt | cut -d ' ' -f 1)
          SHA_AMD64=$(grep 'Crunch-macos-amd64.zip' artifacts/checksums.txt | cut -d ' ' -f 1)
          SHA_CLI_ARM64=$(grep 'crunch-cli-macos-arm64.zip' artifacts/checksums.txt | cut -d ' ' -f 1)
          SHA_CLI_AMD64=$(grep 'crunch-cli-macos-amd64.zip' artifacts/checksums.txt | cut -d ' ' -f 1)
          SHA_CLI_LINUX=$(grep 'crunch-cli-linux-amd64.tar.gz' artifacts/checksums.txt | cut -d ' ' -f 1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/snsnf/homebrew-crunch.git tap
          mkdir -p tap/Casks tap/Formula

          # Update cask (GUI)
          sed -e "s/version \".*\"/version \"$VERSION\"/" \
              -e "s/SHA256_ARM64/$SHA_ARM64/" \
              -e "s/SHA256_AMD64/$SHA_AMD64/" \
              tap/Casks/crunch.rb > tap/Casks/crunch.rb.tmp
          mv tap/Casks/crunch.rb.tmp tap/Casks/crunch.rb

          # Update formula (CLI)
          sed -e "s/version \".*\"/version \"$VERSION\"/" \
              -e "s/SHA256_CLI_ARM64/$SHA_CLI_ARM64/" \
              -e "s/SHA256_CLI_AMD64/$SHA_CLI_AMD64/" \
              -e "s/SHA256_CLI_LINUX/$SHA_CLI_LINUX/" \
              tap/Formula/crunch-cli.rb > tap/Formula/crunch-cli.rb.tmp
          mv tap/Formula/crunch-cli.rb.tmp tap/Formula/crunch-cli.rb

          cd tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Casks/crunch.rb Formula/crunch-cli.rb
          git commit -m "Update crunch to $VERSION."
          git push
