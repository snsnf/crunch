name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: '1.26'

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI with bundled ffmpeg
        working-directory: gui
        run: bash build.sh

      - name: Build CLI
        run: |
          GOARCH=${{ matrix.arch }} go build -o crunch .

      - name: Package
        run: |
          cd gui/build/bin
          zip -r /tmp/Crunch-macos-${{ matrix.arch }}.zip Crunch.app
          cd $GITHUB_WORKSPACE
          zip /tmp/crunch-cli-macos-${{ matrix.arch }}.zip crunch

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-${{ matrix.arch }}
          path: |
            /tmp/Crunch-macos-${{ matrix.arch }}.zip
            /tmp/crunch-cli-macos-${{ matrix.arch }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: '1.26'

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI
        working-directory: gui
        run: wails build

      - name: Download static ffmpeg (Windows)
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg-extract" -Force
          $ffDir = Get-ChildItem "$env:TEMP\ffmpeg-extract" -Directory | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)\bin\ffmpeg.exe" "gui\build\bin\ffmpeg.exe"
          Copy-Item "$($ffDir.FullName)\bin\ffprobe.exe" "gui\build\bin\ffprobe.exe"

      - name: Build CLI
        run: go build -o crunch.exe .

      - name: Build installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts"
          makensis installer\crunch.nsi

      - name: Package CLI
        shell: powershell
        run: |
          Compress-Archive -Path "crunch.exe" -DestinationPath "artifacts\crunch-cli-windows-amd64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-amd64
          path: |
            artifacts\Crunch-Setup-windows-amd64.exe
            artifacts\crunch-cli-windows-amd64.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: '1.26'

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI
        working-directory: gui
        run: wails build

      - name: Download static ffmpeg (Linux)
        run: |
          curl -L -o /tmp/ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          mkdir -p /tmp/ffmpeg-extract
          tar xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract --strip-components=1
          cp /tmp/ffmpeg-extract/ffmpeg gui/build/bin/ffmpeg
          cp /tmp/ffmpeg-extract/ffprobe gui/build/bin/ffprobe
          chmod +x gui/build/bin/ffmpeg gui/build/bin/ffprobe

      - name: Build CLI
        run: go build -o crunch .

      - name: Package
        run: |
          cd gui/build/bin
          tar czf /tmp/Crunch-linux-amd64.tar.gz *
          cd $GITHUB_WORKSPACE
          tar czf /tmp/crunch-cli-linux-amd64.tar.gz crunch

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-amd64
          path: |
            /tmp/Crunch-linux-amd64.tar.gz
            /tmp/crunch-cli-linux-amd64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" \) -exec sha256sum {} \; | sed 's|  \./||' > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@738f0c76948a84ff818b6e43c8b515cb27dbc559 # v2.0.0
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/checksums.txt
